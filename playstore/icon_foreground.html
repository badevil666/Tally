<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Android adaptive-icon foreground:
     - Render canvas: 1024x1024 transparent
     - Safe zone is the inner 66% (Android crops to circle/squircle/etc)
     - So the tally symbol fits inside the inner 672x672 box (≈ 176px margin)
  */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1024px; height: 1024px; overflow: hidden;
               background: transparent; }
  .wrap { width: 1024px; height: 1024px;
          display: flex; align-items: center; justify-content: center; }
  svg { width: 65%; height: 65%; display: block; }  /* stay inside safe zone */
</style>
</head>
<body>
<div class="wrap">
  <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Just the tally symbol — no wordmark, no bg.
         Centered in the safe zone so any system mask is friendly. -->
    <g fill="none" stroke="#D4AF37" stroke-width="40" stroke-linecap="round">
      <line x1="140" y1="80"  x2="140" y2="430"/>
      <line x1="210" y1="80"  x2="210" y2="430"/>
      <line x1="280" y1="80"  x2="280" y2="430"/>
      <line x1="350" y1="80"  x2="350" y2="430"/>
      <line x1="100" y1="310" x2="390" y2="200" stroke-width="42"/>
    </g>
  </svg>
</div>
</body>
</html>
