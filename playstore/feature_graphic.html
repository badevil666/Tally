<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --accent: #FFD54A;
    --accent2: #FFB300;
    --bg-dark: #0A0A0F;
    --bg-grad-1: #1B1530;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: -apple-system, "SF Pro Display", "Inter", "Segoe UI", sans-serif;
    color: white;
  }

  .stage {
    position: relative;
    width: 1024px;
    height: 500px;
    background:
      radial-gradient(ellipse 80% 100% at 20% 50%, var(--bg-grad-1) 0%, var(--bg-dark) 70%),
      var(--bg-dark);
    overflow: hidden;
  }

  /* Glow blobs */
  .stage::before {
    content: '';
    position: absolute;
    top: -150px;
    right: -150px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255, 213, 74, 0.22) 0%, transparent 60%);
    pointer-events: none;
  }
  .stage::after {
    content: '';
    position: absolute;
    bottom: -200px;
    left: 40%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(120, 80, 220, 0.20) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Left text block */
  .text-block {
    position: absolute;
    top: 0;
    left: 64px;
    height: 100%;
    width: 560px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 2;
  }

  /* Wordmark logo */
  .brand {
    margin-bottom: 24px;
    width: 280px;
  }
  .brand svg { width: 100%; height: auto; display: block; }

  .headline {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1.5px;
    background: linear-gradient(180deg, #fff 0%, #d0d0d8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .headline .hl {
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subheadline {
    margin-top: 18px;
    font-size: 20px;
    font-weight: 400;
    line-height: 1.4;
    color: rgba(255, 255, 255, 0.65);
    letter-spacing: -0.2px;
  }

  /* Three little pills */
  .pills {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .pill {
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    font-size: 13px;
    color: rgba(255, 255, 255, 0.8);
    font-weight: 500;
  }
  .pill.accent {
    background: rgba(255, 213, 74, 0.14);
    border-color: rgba(255, 213, 74, 0.3);
    color: var(--accent);
  }

  /* Phone preview on the right */
  .phone-wrap {
    position: absolute;
    top: 50%;
    right: 60px;
    transform: translateY(-50%) rotate(-6deg);
    width: 230px;
    height: 460px;
    z-index: 2;
  }

  .phone {
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 32px;
    padding: 7px;
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.7),
      0 0 0 2px rgba(255, 255, 255, 0.06),
      0 0 0 4px #1a1a1a;
  }
  .phone .screen {
    width: 100%;
    height: 100%;
    border-radius: 26px;
    overflow: hidden;
    background: #000;
  }
  .phone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
  }

  /* Behind-phone secondary phone for depth */
  .phone-wrap-2 {
    position: absolute;
    top: 50%;
    right: 250px;
    transform: translateY(-50%) rotate(6deg);
    width: 200px;
    height: 400px;
    z-index: 1;
    opacity: 0.85;
  }
  .phone-wrap-2 .phone {
    border-radius: 28px;
    padding: 6px;
  }
  .phone-wrap-2 .screen {
    border-radius: 22px;
  }
</style>
</head>
<body>
<div class="stage">

  <!-- Behind phone (dashboard) -->
  <div class="phone-wrap-2">
    <div class="phone"><div class="screen">
      <img src="raw/dashboard.png" alt="">
    </div></div>
  </div>

  <!-- Front phone (inbox) -->
  <div class="phone-wrap">
    <div class="phone"><div class="screen">
      <img src="raw/inbox.png" alt="">
    </div></div>
  </div>

  <div class="text-block">
    <div class="brand">
      <svg viewBox="0 0 770 310" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke="#FFD54A" stroke-width="34" stroke-linecap="round">
          <line x1="80"  y1="40"  x2="80"  y2="240"/>
          <line x1="25"  y1="40"  x2="135" y2="40"/>
          <line x1="170" y1="240" x2="230" y2="40"/>
          <line x1="230" y1="40"  x2="290" y2="240"/>
          <line x1="190" y1="160" x2="270" y2="160"/>
          <line x1="335" y1="40"  x2="335" y2="240"/>
          <line x1="335" y1="240" x2="425" y2="240"/>
          <line x1="460" y1="40"  x2="460" y2="240"/>
          <line x1="460" y1="240" x2="550" y2="240"/>
          <line x1="590" y1="40"  x2="660" y2="130"/>
          <line x1="730" y1="40"  x2="660" y2="130"/>
          <line x1="660" y1="130" x2="660" y2="240"/>
        </g>
        <path d="M 5 280 L 720 270 L 760 215"
              stroke="#FFD54A" stroke-width="22"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="headline">Budget on <span class="hl">autopilot.</span></div>
    <div class="subheadline">Tally reads your bank SMS, logs every payment, and shows exactly where your money goes.</div>
    <div class="pills">
      <div class="pill accent">SMS auto-tracking</div>
      <div class="pill">100% offline</div>
      <div class="pill">No accounts</div>
    </div>
  </div>

</div>
</body>
</html>
