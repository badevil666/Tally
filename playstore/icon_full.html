<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Full launcher icon at 1024px source — used for legacy Android (pre-8)
     and as the master for Play Store 512px. Tally symbol on top, wordmark
     below, deep-black background. */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1024px; height: 1024px; overflow: hidden; background: #000; }

  .icon {
    width: 1024px;
    height: 1024px;
    background:
      radial-gradient(ellipse 80% 80% at 50% 45%, #1a1a1a 0%, #0a0a0a 80%, #000 100%);
    position: relative;
  }
  .icon svg { width: 100%; height: 100%; display: block; }
  .icon::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 50%, rgba(0,0,0,0.45) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="icon">
  <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#D4AF37" stroke-width="22" stroke-linecap="round">
      <line x1="170" y1="90"  x2="170" y2="320"/>
      <line x1="220" y1="90"  x2="220" y2="320"/>
      <line x1="270" y1="90"  x2="270" y2="320"/>
      <line x1="320" y1="90"  x2="320" y2="320"/>
      <line x1="140" y1="245" x2="350" y2="165" stroke-width="24"/>
    </g>
    <text x="256" y="450"
          text-anchor="middle"
          font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif"
          font-size="92"
          font-weight="900"
          letter-spacing="6"
          fill="#D4AF37">TALLY</text>
  </svg>
</div>
</body>
</html>
