<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Play Store phone screenshot — 1080×1920 (9:16) */
  :root {
    --accent: #FFD54A;       /* Tally yellow */
    --accent2: #FFB300;
    --bg-dark: #0A0A0F;
    --bg-grad-1: #1B1530;
    --bg-grad-2: #0A0A0F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: -apple-system, "SF Pro Display", "Inter", "Segoe UI", sans-serif;
    color: white;
  }

  .stage {
    position: relative;
    width: 1080px;
    height: 1920px;
    background:
      radial-gradient(ellipse 80% 60% at 50% 20%, var(--bg-grad-1) 0%, var(--bg-grad-2) 70%),
      var(--bg-dark);
    overflow: hidden;
  }

  /* Subtle background accent blob */
  .stage::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(255, 213, 74, 0.18) 0%, transparent 60%);
    pointer-events: none;
  }

  .stage::after {
    content: '';
    position: absolute;
    bottom: -300px;
    left: -250px;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(120, 80, 220, 0.25) 0%, transparent 60%);
    pointer-events: none;
  }

  .text-block {
    position: absolute;
    top: 100px;
    left: 80px;
    right: 80px;
    text-align: center;
    z-index: 2;
  }

  .headline {
    font-size: 78px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    background: linear-gradient(180deg, #fff 0%, #d0d0d8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .headline .hl {
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subheadline {
    margin-top: 24px;
    font-size: 32px;
    font-weight: 400;
    line-height: 1.35;
    color: rgba(255, 255, 255, 0.65);
    letter-spacing: -0.3px;
  }

  /* Android phone frame */
  .phone {
    position: absolute;
    top: 480px;
    left: 50%;
    transform: translateX(-50%);
    width: 580px;
    height: 1290px;
    background: #000;
    border-radius: 70px;
    padding: 18px;
    box-shadow:
      0 50px 120px rgba(0, 0, 0, 0.6),
      0 0 0 4px rgba(255, 255, 255, 0.08),
      0 0 0 8px #1a1a1a,
      inset 0 0 0 2px #2a2a2a;
  }

  .phone::before {
    /* Punch-hole camera */
    content: '';
    position: absolute;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 24px;
    background: #000;
    border-radius: 50%;
    z-index: 3;
    box-shadow: inset 0 0 0 2px #1a1a1a;
  }

  .phone .screen {
    width: 100%;
    height: 100%;
    border-radius: 54px;
    overflow: hidden;
    background: #000;
    position: relative;
  }

  .phone .screen img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: top;
  }

  /* Brand strip at bottom */
  .brand {
    position: absolute;
    bottom: 50px;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255, 255, 255, 0.35);
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 4px;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="text-block">
    <div class="headline" id="headline">Track <span class="hl">every rupee</span><br>automatically.</div>
    <div class="subheadline" id="subheadline">Tally reads your bank SMS and logs transactions for you — no manual entry.</div>
  </div>
  <div class="phone">
    <div class="screen">
      <img id="screenshot" src="raw/dashboard.png" alt="">
    </div>
  </div>
  <div class="brand">TALLY · YOUR BUDGET ON AUTOPILOT</div>
</div>
<script>
  // Read query params: ?img=...&h1=...&h2=...
  const p = new URLSearchParams(location.search);
  if (p.get('img')) document.getElementById('screenshot').src = p.get('img');
  if (p.get('h1')) document.getElementById('headline').innerHTML = p.get('h1');
  if (p.get('h2')) document.getElementById('subheadline').innerHTML = p.get('h2');
</script>
</body>
</html>
